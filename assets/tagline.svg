<svg width="320" height="70" viewBox="0 0 320 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neumo">
      <feDropShadow dx="6" dy="6" stdDeviation="8" flood-color="#0d0d0f" />
      <feDropShadow dx="-6" dy="-6" stdDeviation="8" flood-color="#2a2a33" />
    </filter>

    <radialGradient id="pulse2" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#5b5bff" stop-opacity="0.4">
        <animate attributeName="stop-opacity"
                 values="0.2;0.6;0.2"
                 dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#1a1a1f" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="320" height="70" rx="20" fill="#1a1a1f" filter="url(#neumo)" />

  <circle cx="160" cy="35" r="90" fill="url(#pulse2)" />

  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle"
        fill="#e6e6e6" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16">
    Always Building · Always Leveling Up
  </text>
</svg>
