<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad">
      <stop offset="0%" stop-color="#1a1a1f">
        <animate attributeName="stop-color"
                 values="#1a1a1f; #242436; #1a1a1f"
                 dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#111118">
        <animate attributeName="stop-color"
                 values="#111118; #1c1c28; #111118"
                 dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" rx="32" fill="url(#grad)" />

  <text x="50%" y="45%" text-anchor="middle" fill="#f5f5f7"
        font-size="40" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="600">
    Jerathel Czerny
  </text>

  <text x="50%" y="62%" text-anchor="middle" fill="#b0b0c0"
        font-size="20" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    Full-Stack Software Engineer · Enterprise Systems · VLOSA Architect
  </text>
</svg>
