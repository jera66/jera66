<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pulse" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#5b5bff" stop-opacity="0.7">
        <animate attributeName="stop-opacity" values="0.3;0.9;0.3" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#111118" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="900" height="180" rx="28" fill="#15151b"/>

  <circle cx="450" cy="90" r="220" fill="url(#pulse)" />

  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
        fill="#f5f5f7" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="32" font-weight="600">
    Jerathel Czerny
  </text>
  <text x="50%" y="62%" dominant-baseline="middle" text-anchor="middle"
        fill="#b0b0c0" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16">
    Full-Stack Software Engineer · VLOSA · Enterprise Systems · Web · Mobile · DevOps · Game Dev
  </text>
</svg>
